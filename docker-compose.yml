services:
  web:
    build: .
    ports:
      - "${PHP_PORT:-8000}:80"
    volumes:
      - ./:/var/www/html:cached
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
      - MYSQL_HOST=${MYSQL_HOST:-db}
    depends_on:
      - db

  db:
    image: mariadb:10.5
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nutriplan}
      MYSQL_USER: ${MYSQL_USER:-nutri}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nutri}
    volumes:
      - db_data:/var/lib/mysql
  redis:
    image: redis:6.2
    restart: always
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:

